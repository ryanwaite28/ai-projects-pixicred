name: Migrate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  migrate:
    name: Run migrations (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Sync DB URLs to Secrets Manager
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-${ENV}-secrets" \
            --query "SecretString" --output text)
          UPDATED=$(echo "$CURRENT" \
            | jq --arg pooler "$DATABASE_URL_POOLER" --arg direct "$DATABASE_URL_DIRECT" \
                 '. + {DATABASE_URL_POOLER: $pooler, DATABASE_URL_DIRECT: $direct}')
          aws secretsmanager put-secret-value \
            --secret-id "pixicred-${ENV}-secrets" \
            --secret-string "$UPDATED"
          echo "✅ DATABASE_URL_POOLER and DATABASE_URL_DIRECT synced to pixicred-${ENV}-secrets"
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}

      - name: Run migrations
        run: |
          # Supabase direct URL is IPv6-only; GitHub Actions runners are IPv4.
          # Session-mode pooler (port 5432, same host as transaction-mode pooler) is
          # IPv4 and supports advisory locks that prisma migrate requires.
          SESSION_URL=$(echo "$DATABASE_URL_POOLER" | sed 's|:6543/|:5432/|')
          DATABASE_URL="$SESSION_URL" npx prisma migrate deploy
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}

      - name: Sync migrations to S3 audit trail
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          aws s3 sync prisma/migrations/ "s3://pixicred-${ENV}-migrations/"
