name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.15.2
  NODE_VERSION: '20'

jobs:
  # ── Backend lint + typecheck ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  # ── Frontend lint + build ─────────────────────────────────────────────────
  ng-lint-build:
    name: Lint & Build (Angular frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Angular lint
        run: npx ng lint

      - name: Angular build (dev)
        run: npx ng build --configuration=dev

      - name: Upload frontend artifact (dev)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: frontend/dist/pixicred-frontend/browser/
          retention-days: 1

  # ── Backend unit tests ────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm run test

  # ── Backend build + upload ────────────────────────────────────────────────
  build-backend:
    name: Build backend Lambdas
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build all Lambda bundles
        run: bash scripts/build.sh

      - name: Smoke-require service Lambda external deps
        working-directory: dist/lambdas/service
        run: |
          node -e "
            // Verify that all external (non-bundled) deps required by the service Lambda
            // actually resolve from within the package directory.
            // Running on linux means native binaries (.node files) are the correct
            // platform for the Lambda Amazon Linux runtime.
            const cwd = process.cwd();
            const assert = (label, fn) => {
              try { fn(); console.log('  ✅', label); }
              catch (e) { console.error('  ❌', label, '-', e.message); process.exitCode = 1; }
            };
            assert('@mapbox/node-pre-gyp loads',  () => require('./node_modules/@mapbox/node-pre-gyp'));
            assert('bcrypt loads',                () => require('./node_modules/bcrypt'));
            assert('@prisma/client loads',        () => require('./node_modules/@prisma/client'));
          "

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/
          retention-days: 1
          include-hidden-files: true

  # ── Pre-deploy shift-left checks (dev) ────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy checks (dev)
    runs-on: ubuntu-latest
    needs: [build-backend, ng-lint-build]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check ACM certificate (ISSUED)
        run: |
          CERT_ARN=$(aws ssm get-parameter \
            --name "/pixicred/dev/acm_certificate_arn" \
            --query "Parameter.Value" --output text)
          STATUS=$(aws acm describe-certificate \
            --certificate-arn "$CERT_ARN" \
            --query "Certificate.Status" --output text)
          if [ "$STATUS" != "ISSUED" ]; then
            echo "❌ ACM certificate not ISSUED (status: $STATUS)"
            exit 1
          fi
          echo "✅ ACM certificate ISSUED"

      - name: Check SES domain identity verified
        run: |
          STATUS=$(aws sesv2 get-email-identity \
            --email-identity pixicred.com \
            --query "VerifiedForSendingStatus" --output text 2>/dev/null || echo "false")
          if [ "$STATUS" != "True" ]; then
            echo "❌ SES domain pixicred.com not verified"
            exit 1
          fi
          echo "✅ SES domain verified"

      - name: Check Lambda packages S3 bucket exists
        run: |
          aws s3api head-bucket --bucket "pixicred-dev-lambda-packages" \
            && echo "✅ Lambda packages bucket exists" \
            || (echo "❌ Lambda packages bucket missing — run bootstrap.sh"; exit 1)

      - name: Check Secrets Manager populated (not placeholder)
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-dev-secrets" \
            --query "SecretString" --output text)
          DB_POOLER=$(echo "$SECRET" | jq -r '.DATABASE_URL_POOLER // empty')
          DB_DIRECT=$(echo "$SECRET" | jq -r '.DATABASE_URL_DIRECT // empty')
          JWT=$(echo "$SECRET" | jq -r '.JWT_SECRET // empty')
          FAIL=0
          if [ -z "$DB_POOLER" ] || echo "$DB_POOLER" | grep -qi "placeholder"; then
            echo "❌ DATABASE_URL_POOLER is missing or placeholder in pixicred-dev-secrets"
            FAIL=1
          fi
          if [ -z "$DB_DIRECT" ] || echo "$DB_DIRECT" | grep -qi "placeholder"; then
            echo "❌ DATABASE_URL_DIRECT is missing or placeholder in pixicred-dev-secrets"
            FAIL=1
          fi
          if [ -z "$JWT" ] || echo "$JWT" | grep -qi "placeholder"; then
            echo "❌ JWT_SECRET is missing or placeholder in pixicred-dev-secrets"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] && echo "✅ Secrets populated"
          exit "$FAIL"

      - name: Check database connectivity (pooler, IPv4)
        run: |
          sudo apt-get install -y postgresql-client -q
          psql "$DATABASE_URL_POOLER" --no-psqlrc -c "SELECT 1" >/dev/null \
            && echo "✅ Database reachable" \
            || (echo "❌ Cannot connect to Supabase database"; exit 1)
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}

  # ── Sync DATABASE_URL + Run migrations on dev ─────────────────────────────
  migrate-dev:
    name: Migrate (dev)
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Sync DB URLs to Secrets Manager
        run: |
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-dev-secrets" \
            --query "SecretString" --output text)
          UPDATED=$(echo "$CURRENT" \
            | jq --arg pooler "$DATABASE_URL_POOLER" --arg direct "$DATABASE_URL_DIRECT" \
                 '. + {DATABASE_URL_POOLER: $pooler, DATABASE_URL_DIRECT: $direct}')
          aws secretsmanager put-secret-value \
            --secret-id "pixicred-dev-secrets" \
            --secret-string "$UPDATED"
          echo "✅ DATABASE_URL_POOLER and DATABASE_URL_DIRECT synced to pixicred-dev-secrets"
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}

      - name: Run migrations
        run: |
          # Supabase direct URL is IPv6-only; GitHub Actions runners are IPv4.
          # Session-mode pooler (port 5432, same host as transaction-mode pooler) is
          # IPv4 and supports advisory locks that prisma migrate requires.
          SESSION_URL=$(echo "$DATABASE_URL_POOLER" | sed 's|:6543/|:5432/|')
          DATABASE_URL="$SESSION_URL" npx prisma migrate deploy
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}

      - name: Sync migrations to S3 audit trail
        run: aws s3 sync prisma/migrations/ s3://pixicred-dev-migrations/

  # ── Deploy to dev ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: [migrate-dev]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/

      - name: Upload Lambda packages to S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            outzip="$(pwd)/dist/${name}.zip"
            if [ "$name" = "service" ]; then
              # Service lambda carries external native deps (Prisma, bcrypt) in node_modules/
              (cd "$dir" && zip -r "$outzip" .)
            else
              zip -j "$outzip" "${dir}index.js" "${dir}index.js.map"
            fi
            aws s3 cp "dist/${name}.zip" "s3://pixicred-dev-lambda-packages/${name}/index.zip"
          done

      - name: Terraform apply (dev)
        working-directory: infra/terraform/envs/dev
        env:
          TF_VAR_aws_profile: ""
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Update Lambda function code from S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            aws lambda update-function-code \
              --function-name "pixicred-dev-${name}" \
              --s3-bucket "pixicred-dev-lambda-packages" \
              --s3-key "${name}/index.zip" \
              --no-cli-pager
          done

  # ── Deploy frontend to dev ────────────────────────────────────────────────
  deploy-frontend-dev:
    name: Deploy frontend (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact (dev)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist/frontend/

      - name: Sync frontend assets to S3
        run: aws s3 sync dist/frontend/ s3://pixicred-dev-frontend/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName,'pixicred-dev-frontend')]].Id | [0]" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

  # ── Smoke tests (dev) ─────────────────────────────────────────────────────
  smoke-test-dev:
    name: Smoke tests (dev)
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-frontend-dev]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh --env dev

  # ── Integration tests against dev ────────────────────────────────────────
  integration-test:
    name: Integration tests (dev)
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-frontend-dev]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          API_URL: https://api.dev.pixicred.com

  # ── Manual approval gate for prod ────────────────────────────────────────
  approve-prod:
    name: Approve prod deployment
    runs-on: ubuntu-latest
    needs: [integration-test, smoke-test-dev]
    if: github.ref == 'refs/heads/main'
    environment: prod-approval
    steps:
      - name: Approved
        run: echo "Prod deployment approved"

  # ── Build frontend for prod (after approval) ─────────────────────────────
  build-frontend-prod:
    name: Build frontend (prod)
    runs-on: ubuntu-latest
    needs: approve-prod
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Angular build (production)
        run: npx ng build --configuration=production

      - name: Upload frontend artifact (prod)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-prod
          path: frontend/dist/pixicred-frontend/browser/
          retention-days: 1

  # ── Sync DATABASE_URL + Run migrations on prod ────────────────────────────
  migrate-prod:
    name: Migrate (prod)
    runs-on: ubuntu-latest
    needs: approve-prod
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Sync DB URLs to Secrets Manager
        run: |
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-prod-secrets" \
            --query "SecretString" --output text)
          UPDATED=$(echo "$CURRENT" \
            | jq --arg pooler "$DATABASE_URL_POOLER" --arg direct "$DATABASE_URL_DIRECT" \
                 '. + {DATABASE_URL_POOLER: $pooler, DATABASE_URL_DIRECT: $direct}')
          aws secretsmanager put-secret-value \
            --secret-id "pixicred-prod-secrets" \
            --secret-string "$UPDATED"
          echo "✅ DATABASE_URL_POOLER and DATABASE_URL_DIRECT synced to pixicred-prod-secrets"
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}

      - name: Run migrations
        run: |
          SESSION_URL=$(echo "$DATABASE_URL_POOLER" | sed 's|:6543/|:5432/|')
          DATABASE_URL="$SESSION_URL" npx prisma migrate deploy
        env:
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}

      - name: Sync migrations to S3 audit trail
        run: aws s3 sync prisma/migrations/ s3://pixicred-prod-migrations/

  # ── Deploy to prod ────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: migrate-prod
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/

      - name: Upload Lambda packages to S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            outzip="$(pwd)/dist/${name}.zip"
            if [ "$name" = "service" ]; then
              # Service lambda carries external native deps (Prisma, bcrypt) in node_modules/
              (cd "$dir" && zip -r "$outzip" .)
            else
              zip -j "$outzip" "${dir}index.js" "${dir}index.js.map"
            fi
            aws s3 cp "dist/${name}.zip" "s3://pixicred-prod-lambda-packages/${name}/index.zip"
          done

      - name: Terraform apply (prod)
        working-directory: infra/terraform/envs/prod
        env:
          TF_VAR_aws_profile: ""
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Update Lambda function code from S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            aws lambda update-function-code \
              --function-name "pixicred-prod-${name}" \
              --s3-bucket "pixicred-prod-lambda-packages" \
              --s3-key "${name}/index.zip" \
              --no-cli-pager
          done

  # ── Deploy frontend to prod ───────────────────────────────────────────────
  deploy-frontend-prod:
    name: Deploy frontend (prod)
    runs-on: ubuntu-latest
    needs: [deploy-prod, build-frontend-prod]
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact (prod)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-prod
          path: dist/frontend/

      - name: Sync frontend assets to S3
        run: aws s3 sync dist/frontend/ s3://pixicred-prod-frontend/ --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName,'pixicred-prod-frontend')]].Id | [0]" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

  # ── Smoke tests (prod) ────────────────────────────────────────────────────
  smoke-test-prod:
    name: Smoke tests (prod)
    runs-on: ubuntu-latest
    needs: [deploy-prod, deploy-frontend-prod]
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh --env prod
