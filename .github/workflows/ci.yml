name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.15.2
  NODE_VERSION: '20'

jobs:
  # ── Backend lint + typecheck ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  # ── Frontend lint + build ─────────────────────────────────────────────────
  ng-lint-build:
    name: Lint & Build (Angular frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Angular lint
        run: npx ng lint

      - name: Angular build (dev)
        run: npx ng build --configuration=dev

      - name: Upload frontend artifact (dev)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: frontend/dist/
          retention-days: 1

  # ── Backend unit tests ────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm run test

  # ── Backend build + upload ────────────────────────────────────────────────
  build-backend:
    name: Build backend Lambdas
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build all Lambda bundles
        run: bash scripts/build.sh

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/
          retention-days: 1

  # ── Run migrations on dev ────────────────────────────────────────────────
  migrate-dev:
    name: Migrate (dev)
    runs-on: ubuntu-latest
    needs: [build-backend, ng-lint-build]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Fetch MIGRATIONS_DATABASE_URL from Secrets Manager
        run: |
          MIGRATIONS_DATABASE_URL=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-dev-secrets" \
            --query 'SecretString' --output text | jq -r '.MIGRATIONS_DATABASE_URL')
          echo "DATABASE_URL=${MIGRATIONS_DATABASE_URL}" >> "$GITHUB_ENV"

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Sync migrations to S3 audit trail
        run: aws s3 sync prisma/migrations/ s3://pixicred-dev-migrations/

  # ── Deploy to dev ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: [migrate-dev]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/

      - name: Upload Lambda packages to S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            zip -j "dist/${name}.zip" "${dir}index.js" "${dir}index.js.map"
            aws s3 cp "dist/${name}.zip" "s3://pixicred-dev-lambda-packages/${name}/index.zip"
          done

      - name: Terraform apply (dev)
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="vpc_id=${{ secrets.VPC_ID }}" \
            -var="subnet_ids=${{ secrets.SUBNET_IDS }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}"

  # ── Deploy frontend to dev ────────────────────────────────────────────────
  deploy-frontend-dev:
    name: Deploy frontend (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact (dev)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: dist/frontend/

      - name: Sync frontend assets to S3
        run: aws s3 sync dist/frontend/ s3://pixicred-dev-frontend/ --delete

      - name: Invalidate CloudFront cache
        working-directory: infra/terraform/envs/dev
        run: |
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

  # ── Integration tests against dev ────────────────────────────────────────
  integration-test:
    name: Integration tests (dev)
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-frontend-dev]
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          API_URL: https://api.pixicred.com

  # ── Manual approval gate for prod ────────────────────────────────────────
  approve-prod:
    name: Approve prod deployment
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    environment: prod-approval
    steps:
      - name: Approved
        run: echo "Prod deployment approved"

  # ── Build frontend for prod (after approval) ─────────────────────────────
  build-frontend-prod:
    name: Build frontend (prod)
    runs-on: ubuntu-latest
    needs: approve-prod
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Angular build (production)
        run: npx ng build --configuration=production

      - name: Upload frontend artifact (prod)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-prod
          path: frontend/dist/
          retention-days: 1

  # ── Run migrations on prod ────────────────────────────────────────────────
  migrate-prod:
    name: Migrate (prod)
    runs-on: ubuntu-latest
    needs: approve-prod
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Fetch MIGRATIONS_DATABASE_URL from Secrets Manager
        run: |
          MIGRATIONS_DATABASE_URL=$(aws secretsmanager get-secret-value \
            --secret-id "pixicred-prod-secrets" \
            --query 'SecretString' --output text | jq -r '.MIGRATIONS_DATABASE_URL')
          echo "DATABASE_URL=${MIGRATIONS_DATABASE_URL}" >> "$GITHUB_ENV"

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Sync migrations to S3 audit trail
        run: aws s3 sync prisma/migrations/ s3://pixicred-prod-migrations/

  # ── Deploy to prod ────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: migrate-prod
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist/lambdas/

      - name: Upload Lambda packages to S3
        run: |
          for dir in dist/lambdas/*/; do
            name=$(basename "$dir")
            zip -j "dist/${name}.zip" "${dir}index.js" "${dir}index.js.map"
            aws s3 cp "dist/${name}.zip" "s3://pixicred-prod-lambda-packages/${name}/index.zip"
          done

      - name: Terraform apply (prod)
        working-directory: infra/terraform/envs/prod
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="vpc_id=${{ secrets.VPC_ID }}" \
            -var="subnet_ids=${{ secrets.SUBNET_IDS }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}"

  # ── Deploy frontend to prod ───────────────────────────────────────────────
  deploy-frontend-prod:
    name: Deploy frontend (prod)
    runs-on: ubuntu-latest
    needs: [deploy-prod, build-frontend-prod]
    if: github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact (prod)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-prod
          path: dist/frontend/

      - name: Sync frontend assets to S3
        run: aws s3 sync dist/frontend/ s3://pixicred-prod-frontend/ --delete

      - name: Invalidate CloudFront cache
        working-directory: infra/terraform/envs/prod
        run: |
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
