services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pixicred
      POSTGRES_USER: pixicred
      POSTGRES_PASSWORD: pixicred_local
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pixicred -d pixicred']
      interval: 5s
      timeout: 5s
      retries: 10

  ministack:
    image: ministackorg/ministack:latest
    ports:
      - '4566:4566'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_ministack/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  ministack-init:
    image: amazon/aws-cli
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./infra/ministack/init.sh:/init.sh
    entrypoint: ['/bin/bash', '/init.sh']
