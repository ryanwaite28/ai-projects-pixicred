services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pixicred
      POSTGRES_USER: pixicred
      POSTGRES_PASSWORD: pixicred_local
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pixicred -d pixicred']
      interval: 5s
      timeout: 5s
      retries: 10

  ministack:
    image: ministackorg/ministack:latest
    ports:
      - '4566:4566'
    healthcheck:
      test: ['CMD-SHELL', 'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:4566/_ministack/health'')" || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  ministack-init:
    image: amazon/aws-cli
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./infra/ministack/init.sh:/init.sh
    entrypoint: ['/bin/bash', '/init.sh']

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: local-dev
    command: node dist/local/api-server.js
    ports:
      - '3000:3000'
    volumes:
      - ./dist:/app/dist:ro
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://pixicred:pixicred_local@postgres:5432/pixicred
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://ministack:4566
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      SES_FROM_EMAIL: no-reply@pixicred.com
      PORTAL_BASE_URL: http://localhost:4200
      CREDIT_CHECK_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-credit-check
      NOTIFICATION_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-notifications
      STATEMENT_GEN_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-statement-gen
      BILLING_LIFECYCLE_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-billing-lifecycle
      SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:pixicred-local-events
    depends_on:
      postgres:
        condition: service_healthy
      ministack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(''http'').get(''http://localhost:3000/'',r=>process.exit(r.statusCode<500?0:1)).on(''error'',()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: local-dev
    command: node dist/local/worker.js
    volumes:
      - ./dist:/app/dist:ro
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://pixicred:pixicred_local@postgres:5432/pixicred
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://ministack:4566
      SES_FROM_EMAIL: no-reply@pixicred.com
      PORTAL_BASE_URL: http://localhost:4200
      CREDIT_CHECK_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-credit-check
      NOTIFICATION_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-notifications
      STATEMENT_GEN_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-statement-gen
      BILLING_LIFECYCLE_QUEUE_URL: http://ministack:4566/000000000000/pixicred-local-billing-lifecycle
      SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:pixicred-local-events
    depends_on:
      postgres:
        condition: service_healthy
      ministack-init:
        condition: service_completed_successfully
